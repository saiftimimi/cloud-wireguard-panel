<!doctype html>
<html lang="{{ ui_language }}" dir="{{ ui_direction }}" data-theme="{{ ui_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ t('login') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>



<body class="login-page">
  <div class="login-glow one"></div>
  <div class="login-glow two"></div>
  <section class="login-card">
    <img class="login-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="logo">
    <h1>{{ settings.system_name }}</h1>
    <p>إدارة آمنة لاتصالات WireGuard وMikroTik</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <label>{{ t('username') }}</label>
      <input name="username" autocomplete="username" required autofocus>
      <label>{{ t('password') }}</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button class="btn primary wide">{{ t('login') }}</button>
    </form>
    <a class="portal-switch-link" href="{{ url_for('agent_login') }}">دخول بوابة الوكلاء</a>
    <div class="login-foot">Secure • Fast • Reliable</div>
  </section>



</body>
</html>

{% extends "base.html" %}{% set heading="وضع الصيانة" %}{% set subheading="إيقاف دخول الوكلاء أثناء أعمال الصيانة" %}{% block content %}<section class="panel maintenance-control"><div class="panel-head"><div><h2>حالة وضع الصيانة</h2><p>جلسة الأدمن تبقى فعالة</p></div><span class="status {{ 'off' if enabled else 'on' }}">{{ 'مفعّل' if enabled else 'متوقف' }}</span></div><form method="post" class="maintenance-actions"><input type="hidden" name="enabled" value="{{ '0' if enabled else '1' }}"><button class="btn {{ 'danger' if not enabled else 'primary' }}">{{ 'تفعيل وضع الصيانة' if not enabled else 'إيقاف وضع الصيانة' }}</button></form></section>{% endblock %}

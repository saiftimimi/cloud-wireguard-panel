<!doctype html>
<html lang="{{ ui_language }}" dir="{{ ui_direction }}" data-theme="{{ ui_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050b18">
  <title>{{ t('login') }} — {{ settings.system_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v={{ cloud_version|default('10.0.7') }}">
</head>
<body class="login-page">
  <div class="login-glow one"></div>
  <div class="login-glow two"></div>

  <section class="login-card">
    <img class="login-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="{{ settings.system_name }}">
    <h1>{{ settings.system_name }}</h1>
    <p>إدارة آمنة لاتصالات WireGuard وMikroTik</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" action="{{ url_for('login') }}">
      <label for="loginUsername">{{ t('username') }}</label>
      <input id="loginUsername" name="username" autocomplete="username" required autofocus dir="ltr">

      <label for="loginPassword">{{ t('password') }}</label>
      <input id="loginPassword" type="password" name="password" autocomplete="current-password" required dir="ltr">

      <button class="btn primary wide" type="submit">{{ t('login') }}</button>
    </form>
<div class="login-foot">Secure • Fast • Reliable</div>
  </section>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دخول الأدمن</title>
</head>
<body style="margin:0;background:#fff;color:#000;font-family:Tahoma,Arial;padding:30px">
<div style="max-width:420px;margin:50px auto;border:3px solid #000;padding:25px">
    <h1 style="text-align:center">دخول الأدمن</h1>

    <form method="post" action="/login">
        <label style="display:block;margin:15px 0 7px">اسم المستخدم</label>
        <input name="username" value="admin" required
               style="width:100%;padding:14px;font-size:18px;box-sizing:border-box">

        <label style="display:block;margin:15px 0 7px">كلمة المرور</label>
        <input type="password" name="password" required
               style="width:100%;padding:14px;font-size:18px;box-sizing:border-box">

        <button type="submit"
                style="width:100%;padding:15px;margin-top:20px;font-size:18px;background:#165dcc;color:white;border:0">
            تسجيل الدخول
        </button>
    </form>
</div>
</body>
</html>

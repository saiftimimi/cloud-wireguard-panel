<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#050b18">
    <title>تسجيل الدخول — Cloud WG Panel</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
            font-family: Tahoma, Arial, sans-serif;
            color: #ffffff;
            background:
                radial-gradient(circle at 75% 10%, #18366f 0, transparent 35%),
                radial-gradient(circle at 10% 90%, #54245f 0, transparent 32%),
                #030914;
        }

        .login-card {
            display: block;
            position: relative;
            width: 100%;
            max-width: 430px;
            padding: 32px;
            border: 1px solid #263653;
            border-radius: 22px;
            background: #071020;
            box-shadow: 0 30px 80px rgba(0,0,0,.65);
            visibility: visible;
            opacity: 1;
            z-index: 10;
        }

        .logo {
            display: block;
            width: 105px;
            height: 105px;
            margin: 0 auto 12px;
            object-fit: contain;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 27px;
        }

        .subtitle {
            margin: 10px 0 24px;
            text-align: center;
            color: #94a3ba;
        }

        label {
            display: block;
            margin: 15px 0 8px;
            color: #b9c5d8;
            font-size: 14px;
        }

        input {
            display: block;
            width: 100%;
            min-height: 50px;
            padding: 12px 14px;
            border: 1px solid #293b5c;
            border-radius: 11px;
            outline: none;
            background: #040b17;
            color: #ffffff;
            font: inherit;
            direction: ltr;
        }

        input:focus {
            border-color: #6a5cff;
            box-shadow: 0 0 0 3px rgba(106,92,255,.2);
        }

        button {
            display: block;
            width: 100%;
            min-height: 52px;
            margin-top: 23px;
            border: 0;
            border-radius: 11px;
            cursor: pointer;
            color: #ffffff;
            font: bold 16px Tahoma, Arial, sans-serif;
            background: linear-gradient(90deg, #285de0, #783bda);
        }

        .alert {
            margin-bottom: 18px;
            padding: 12px 14px;
            border: 1px solid #7c2934;
            border-radius: 10px;
            background: #3c151b;
            color: #ffabb1;
        }

        .footer {
            margin-top: 22px;
            text-align: center;
            color: #66758e;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <main class="login-card">
        <img class="logo"
             src="{{ url_for('static', filename='images/logo.png') }}"
             alt="Cloud WG Panel">

        <h1>{{ settings.system_name|default('Cloud WG Panel', true) }}</h1>
        <p class="subtitle">سجّل الدخول إلى لوحة الإدارة</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="post" action="{{ url_for('login') }}">
            <label for="username">اسم المستخدم</label>
            <input id="username"
                   name="username"
                   autocomplete="username"
                   required
                   autofocus>

            <label for="password">كلمة المرور</label>
            <input id="password"
                   type="password"
                   name="password"
                   autocomplete="current-password"
                   required>

            <button type="submit">تسجيل الدخول</button>
        </form>

        <div class="footer">Secure • Fast • Reliable</div>
    </main>
</body>
</html>
